apiVersion: apps/v1
kind: Deployment 
metadata: 
     name: apache-deployment
     namespace: apps-ns
spec: 
   replicas: 2
   selector:
     matchLabels:
       app: apache-app
   template: 
     metadata:
       labels:
         app: apache-app
     spec: 
       containers:
       - name: apache
         image: http:2.4
         ports: 
         - containerPort: 80
         resources:
           requests:
             cpu: "250m"
             memory: "64Mi"
           limits: 
             cpu: "500m"
             memory: "128Mi"
    