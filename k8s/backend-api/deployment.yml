apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend-deployment
    namespace: backend-api-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend 
          image: api
          ports:
            - containerPort: 5500
          resources: 
            requests:
              cpu: "100m"
              memory: "125mi"
            limits:
              cpu: "500m"
              memory: "512mi"