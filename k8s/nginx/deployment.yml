apiVersion: apps/v1
kind: Deployment 
metadata: 
     name: nginx-deployment
     namespace: apps-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec: 
       containers:
         - name: nginx
           image: nginx:latest
           ports: 
            - containerPort: 80
           resources:
             requests: 
               cpu: "250m"
               memory: "64Mi"
             limits: 
               cpu: "500m"
               memory: "128Mi" 
                