apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
   name: backend-app
   namespace: argocd
spec:
  project: default
  source:
    repoUrl: https://github.com/manityatyagi/argocd-k8s.git
    targetRevision: main
    path: k8s/backend-api
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true    