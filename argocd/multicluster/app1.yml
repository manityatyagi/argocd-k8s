apiVersion: argoproj.io/v1alpha1 
kind: Application
metadata:
    name: app1 
    namespace: argocd
spec: 
  project: simple-project
  source:
    repoURL: https://github.com/manityatyagi/argocd-k8s.git
    targetRevision: main 
    path: k8s/backend-api
  destination:
    server: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true