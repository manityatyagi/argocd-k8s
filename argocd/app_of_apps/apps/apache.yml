apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: apache-child
    namespace: argocd
spec:
   project: default
   source: 
     repoURL: https://github.com/manityatyagi/argocd-k8s.git
     targetRevision: main
     path: k8s/apache
   destination:
     server: https://kubernetes.default.svc
     namespace: argocd
   syncPolicy:
     automated: 
       prune: true
       selfHeal: true
       